apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana
  namespace: monitoring
spec:
  releaseName: grafana
  chart:
    spec:
      chart: grafana
      version: "8.5.2"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: monitoring
  interval: 2m
  values:
    tolerations:
      - key: node-type
        operator: Equal
        value: mimir
        effect: NoSchedule
    nodeSelector:
      node-type: mimir

    datasources:
      datasources.yaml:
        apiVersion: 1
        datasources:
          - name: Mimir
            type: prometheus
            url: http://mimir-nginx.mimir.svc.cluster.local/prometheus
            access: proxy
            isDefault: true

    persistence:
      enabled: true
      size: 5Gi
