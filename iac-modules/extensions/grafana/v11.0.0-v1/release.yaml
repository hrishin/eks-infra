apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana
  namespace: monitoring
spec:
  releaseName: grafana
  chart:
    spec:
      chart: grafana
      version: "8.5.2"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: monitoring
  interval: 2m
  values:
    tolerations:
      - key: node-type
        operator: Equal
        value: mimir
        effect: NoSchedule
    nodeSelector:
      node-type: mimir

    env:
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s/grafana"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"

    datasources:
      datasources.yaml:
        apiVersion: 1
        datasources:
          - name: Mimir
            type: prometheus
            url: http://main-gateway.kgateway-system.svc.cluster.local:3080/mimir/prometheus
            access: proxy
            isDefault: true

    persistence:
      enabled: true
      size: 5Gi
      storageClassName: local-path
