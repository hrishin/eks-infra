apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: main-gateway-tls
  namespace: kgateway-system
spec:
  secretName: main-gateway-tls
  duration: 2160h
  renewBefore: 360h
  privateKey:
    algorithm: RSA
    size: 2048
  usages:
    - server auth
  dnsNames:
    - "*.eu-west-2.elb.amazonaws.com"
    - localhost
  issuerRef:
    name: selfsigned
    kind: ClusterIssuer
    group: cert-manager.io
