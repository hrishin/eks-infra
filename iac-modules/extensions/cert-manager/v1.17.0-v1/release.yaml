apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: cert-manager
spec:
  releaseName: cert-manager
  chart:
    spec:
      chart: cert-manager
      version: "v1.17.0"
      sourceRef:
        kind: HelmRepository
        name: cert-manager
        namespace: cert-manager
  interval: 2m
  install:
    crds: Create
  upgrade:
    crds: CreateReplace
  values:
    tolerations:
      - key: node-type
        operator: Equal
        value: core
        effect: NoSchedule
      - key: node.cilium.io/agent-not-ready
        operator: Exists
        effect: NoSchedule
    webhook:
      tolerations:
        - key: node-type
          operator: Equal
          value: core
          effect: NoSchedule
        - key: node.cilium.io/agent-not-ready
          operator: Exists
          effect: NoSchedule
    cainjector:
      tolerations:
        - key: node-type
          operator: Equal
          value: core
          effect: NoSchedule
        - key: node.cilium.io/agent-not-ready
          operator: Exists
          effect: NoSchedule
    startupapicheck:
      tolerations:
        - key: node-type
          operator: Equal
          value: core
          effect: NoSchedule
        - key: node.cilium.io/agent-not-ready
          operator: Exists
          effect: NoSchedule
