apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mimir-write
  namespace: mimir
spec:
  parentRefs:
    - name: main-gateway
      namespace: kgateway-system
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /mimir/api/v1/push
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /api/v1/push
      backendRefs:
        - name: mimir-distributor
          port: 8080
    - matches:
        - path:
            type: PathPrefix
            value: /mimir/otlp/v1/metrics
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /otlp/v1/metrics
      backendRefs:
        - name: mimir-distributor
          port: 8080
---
