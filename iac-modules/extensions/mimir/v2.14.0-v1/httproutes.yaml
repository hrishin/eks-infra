apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mimir-write
  namespace: mimir
spec:
  parentRefs:
    - name: main-gateway
      namespace: kgateway-system
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/v1/push
      backendRefs:
        - name: mimir-distributor
          port: 8080
    - matches:
        - path:
            type: PathPrefix
            value: /otlp/v1/metrics
      backendRefs:
        - name: mimir-distributor
          port: 8080
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mimir-query
  namespace: mimir
spec:
  parentRefs:
    - name: main-gateway
      namespace: kgateway-system
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /prometheus
      backendRefs:
        - name: mimir-query-frontend
          port: 8080
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mimir-ruler
  namespace: mimir
spec:
  parentRefs:
    - name: main-gateway
      namespace: kgateway-system
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /ruler
      backendRefs:
        - name: mimir-ruler
          port: 8080
    - matches:
        - path:
            type: PathPrefix
            value: /api/v1/rules
      backendRefs:
        - name: mimir-ruler
          port: 8080
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mimir-alertmanager
  namespace: mimir
spec:
  parentRefs:
    - name: main-gateway
      namespace: kgateway-system
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /alertmanager
      backendRefs:
        - name: mimir-alertmanager
          port: 8080
    - matches:
        - path:
            type: PathPrefix
            value: /multitenant_alertmanager
      backendRefs:
        - name: mimir-alertmanager
          port: 8080
