apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mimir
  namespace: mimir
spec:
  releaseName: mimir
  chart:
    spec:
      chart: mimir-distributed
      version: "5.6.0"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: mimir
  interval: 2m
  values:
    minio:
      enabled: false

    mimir:
      structuredConfig:
        multitenancy_enabled: false
        replication_factor: 1
        common:
          storage:
            backend: filesystem
        blocks_storage:
          filesystem:
            dir: /data/blocks
        alertmanager_storage:
          filesystem:
            dir: /data/alertmanager
        ruler_storage:
          filesystem:
            dir: /data/ruler

    ingester:
      replicas: 1
      zoneAwareReplication:
        enabled: false
      tolerations:
        - key: node-type
          operator: Equal
          value: mimir
          effect: NoSchedule
      nodeSelector:
        node-type: mimir
      persistentVolume:
        enabled: true
        size: 10Gi

    store_gateway:
      replicas: 1
      zoneAwareReplication:
        enabled: false
      tolerations:
        - key: node-type
          operator: Equal
          value: mimir
          effect: NoSchedule
      nodeSelector:
        node-type: mimir
      persistentVolume:
        enabled: true
        size: 10Gi

    compactor:
      replicas: 1
      tolerations:
        - key: node-type
          operator: Equal
          value: mimir
          effect: NoSchedule
      nodeSelector:
        node-type: mimir
      persistentVolume:
        enabled: true
        size: 10Gi

    distributor:
      replicas: 1
      tolerations:
        - key: node-type
          operator: Equal
          value: mimir
          effect: NoSchedule
      nodeSelector:
        node-type: mimir

    querier:
      replicas: 1
      tolerations:
        - key: node-type
          operator: Equal
          value: mimir
          effect: NoSchedule
      nodeSelector:
        node-type: mimir

    query_frontend:
      replicas: 1
      tolerations:
        - key: node-type
          operator: Equal
          value: mimir
          effect: NoSchedule
      nodeSelector:
        node-type: mimir

    query_scheduler:
      replicas: 1
      tolerations:
        - key: node-type
          operator: Equal
          value: mimir
          effect: NoSchedule
      nodeSelector:
        node-type: mimir

    ruler:
      replicas: 1
      tolerations:
        - key: node-type
          operator: Equal
          value: mimir
          effect: NoSchedule
      nodeSelector:
        node-type: mimir

    alertmanager:
      replicas: 1
      tolerations:
        - key: node-type
          operator: Equal
          value: mimir
          effect: NoSchedule
      nodeSelector:
        node-type: mimir
      persistentVolume:
        enabled: true
        size: 1Gi

    nginx:
      replicas: 1
      tolerations:
        - key: node-type
          operator: Equal
          value: mimir
          effect: NoSchedule
      nodeSelector:
        node-type: mimir

    overrides_exporter:
      replicas: 1
      tolerations:
        - key: node-type
          operator: Equal
          value: mimir
          effect: NoSchedule
      nodeSelector:
        node-type: mimir

    rollout_operator:
      tolerations:
        - key: node-type
          operator: Equal
          value: mimir
          effect: NoSchedule
      nodeSelector:
        node-type: mimir
