apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mimir
  namespace: mimir
spec:
  releaseName: mimir
  chart:
    spec:
      chart: mimir-distributed
      version: "5.6.0"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: mimir
  interval: 2m
  values:
    global:
      nodeSelector:
        node-type: mimir
      tolerations:
        - key: node-type
          operator: Equal
          value: mimir
          effect: NoSchedule

    mimir:
      structuredConfig:
        multitenancy_enabled: false
        common:
          storage:
            backend: filesystem
        blocks_storage:
          filesystem:
            dir: /data/blocks
        alertmanager_storage:
          filesystem:
            dir: /data/alertmanager
        ruler_storage:
          filesystem:
            dir: /data/ruler

    ingester:
      replicas: 1
      persistentVolume:
        enabled: true
        size: 10Gi

    store_gateway:
      replicas: 1
      persistentVolume:
        enabled: true
        size: 10Gi

    compactor:
      replicas: 1
      persistentVolume:
        enabled: true
        size: 10Gi

    distributor:
      replicas: 1

    querier:
      replicas: 1

    query_frontend:
      replicas: 1
