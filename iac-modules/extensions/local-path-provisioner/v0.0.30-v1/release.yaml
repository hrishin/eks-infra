apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: local-path-provisioner
  namespace: local-path-storage
spec:
  releaseName: local-path-provisioner
  chart:
    spec:
      chart: local-path-provisioner
      version: "0.0.30"
      sourceRef:
        kind: HelmRepository
        name: local-path-provisioner
        namespace: local-path-storage
  interval: 2m
  values:
    tolerations:
      - key: node-type
        operator: Equal
        value: core
        effect: NoSchedule
    nodeSelector:
      node-type: core

    storageClass:
      create: true
      name: local-path
      reclaimPolicy: Delete

    # Helper pods provision volumes on target nodes — must tolerate all node taints
    helperPod:
      tolerations:
        - operator: Exists
