apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
  namespace: kube-system
spec:
  releaseName: cilium
  chart:
    spec:
      chart: cilium
      version: "1.18.3" 
      sourceRef:
        kind: HelmRepository
        name: cilium
        namespace: kube-system
  interval: 2m
  values:
    autoDirectNodeRoutes: true
    bpf:
      datapathMode: netkit
      masquerade: true
    cluster:
      name: "${CLUSTER_NAME}"
    enableIPv4Masquerade: true
    enableIPv6Masquerade: true
    # --- ENI IPAM mode (commented out) ---
    # eni:
    #   enabled: true
    #   awsEnablePrefixDelegation: true
    ipv4NativeRoutingCIDR: 192.168.0.0/16
    routingMode: native

    hubble:
      enabled: true
      relay:
        enabled: true
        tolerations:
          - effect: NoSchedule
            key: node-type
            operator: Equal
            value: core
      ui:
        enabled: true
        tolerations:
          - effect: NoSchedule
            key: node-type
            operator: Equal
            value: core
    image:
      repository: quay.io/cilium/cilium
      tag: v1.16.4
    # --- ENI IPAM configuration (commented out) ---
    # ipam:
    #   eni:
    #     enabled: true
    #     securityGroupTags: {}
    #     subnetTags: {}
    #   mode: eni

    # --- Cluster Scope IPAM mode ---
    ipam:
      mode: cluster-pool
      operator:
        clusterPoolIPv4PodCIDRList:
          - 192.168.0.0/16
        clusterPoolIPv4MaskSize: 24
    k8sServiceHost: ${CLUSTER_ENDPOINT}
    k8sServicePort: 443
    kubeProxyReplacement: true
    loadBalancer:
      algorithm: maglev
      mode: dsr
    nodePort:
      enabled: true
    operator:
      image:
        repository: quay.io/cilium/operator
        tag: v1.16.4
      prometheus:
        enabled: true
      replicas: 1
      tolerations:
        - effect: NoSchedule
          key: node-type
          operator: Equal
          value: core
    prometheus:
      enabled: true


