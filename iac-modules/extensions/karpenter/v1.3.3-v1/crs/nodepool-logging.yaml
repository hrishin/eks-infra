apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: logging
spec:
  template:
    metadata:
      labels:
        node-type: logging
        workload: monitoring
        environment: production
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default
      taints:
        - key: node-type
          value: logging
          effect: NoSchedule
      requirements:
        - key: node.kubernetes.io/instance-type
          operator: In
          values: ["t3.large", "t3.xlarge", "t3a.large", "t3a.xlarge"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand", "spot"]
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
  limits:
    cpu: "24"
    memory: 96Gi
  disruption:
    consolidationPolicy: WhenEmpty
    consolidateAfter: 30s
