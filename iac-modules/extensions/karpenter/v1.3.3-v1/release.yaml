apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: karpenter
  namespace: kube-system
spec:
  releaseName: karpenter
  chart:
    spec:
      chart: karpenter
      version: "1.3.3"
      sourceRef:
        kind: HelmRepository
        name: karpenter
  interval: 2m
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:
    settings:
      clusterName: "${CLUSTER_NAME}"
      clusterEndpoint: "https://${CLUSTER_ENDPOINT}"
    serviceAccount:
      create: true
      name: karpenter
    tolerations:
      - key: node-type
        operator: Equal
        value: core
        effect: NoSchedule
    nodeSelector:
      node-type: core
    controller:
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          memory: 256Mi
