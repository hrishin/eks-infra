apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kibana
  namespace: logging
spec:
  releaseName: kibana
  chart:
    spec:
      chart: kibana
      version: "8.5.1"
      sourceRef:
        kind: HelmRepository
        name: elastic
        namespace: logging
  interval: 2m
  timeout: 10m
  dependsOn:
    - name: elasticsearch
      namespace: logging
  values:
    replicas: 1

    kibanaConfig:
      kibana.yml: |
        server.basePath: "/kibana"
        server.rewriteBasePath: true

    resources:
      requests:
        cpu: "200m"
        memory: "512Mi"
      limits:
        cpu: "1000m"
        memory: "1Gi"

    tolerations:
      - key: node-type
        operator: Equal
        value: logging
        effect: NoSchedule
    nodeSelector:
      node-type: logging

    service:
      type: ClusterIP
      port: 5601
