apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kibana
  namespace: logging
spec:
  releaseName: kibana
  chart:
    spec:
      chart: kibana
      version: "8.5.1"
      sourceRef:
        kind: HelmRepository
        name: elastic
        namespace: logging
  interval: 2m
  dependsOn:
    - name: elasticsearch
      namespace: logging
  postRenderers:
    - kustomize:
        patches:
          # Inject tolerations into all hook jobs so they can be scheduled
          - patch: |
              - op: add
                path: /spec/template/spec/tolerations
                value:
                  - key: node-type
                    operator: Equal
                    value: logging
                    effect: NoSchedule
              - op: add
                path: /spec/template/spec/nodeSelector
                value:
                  node-type: logging
            target:
              group: batch
              version: v1
              kind: Job
          # Change hook delete policy to before-hook-creation so stale hook
          # resources are cleaned up before the next install/upgrade attempt
          - patch: |
              - op: replace
                path: /metadata/annotations/helm.sh~1hook-delete-policy
                value: before-hook-creation
            target:
              annotationSelector: "helm.sh/hook-delete-policy"
  values:
    replicas: 1

    kibanaConfig:
      kibana.yml: |
        server.basePath: "/kibana"
        server.rewriteBasePath: true
        elasticsearch.hosts: ["http://elasticsearch-master:9200"]

    resources:
      requests:
        cpu: "200m"
        memory: "512Mi"
      limits:
        cpu: "1000m"
        memory: "1Gi"

    tolerations:
      - key: node-type
        operator: Equal
        value: logging
        effect: NoSchedule
    nodeSelector:
      node-type: logging

    service:
      type: ClusterIP
      port: 5601
