apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: elasticsearch
  namespace: logging
spec:
  releaseName: elasticsearch
  chart:
    spec:
      chart: elasticsearch
      version: "8.5.1"
      sourceRef:
        kind: HelmRepository
        name: elastic
        namespace: logging
  interval: 2m
  values:
    replicas: 1
    minimumMasterNodes: 1

    esJavaOpts: "-Xmx1g -Xms1g"

    esConfig:
      elasticsearch.yml: |
        xpack.security.enabled: false
        xpack.security.enrollment.enabled: false

    resources:
      requests:
        cpu: "500m"
        memory: "1Gi"
      limits:
        cpu: "1000m"
        memory: "2Gi"

    volumeClaimTemplate:
      storageClassName: local-path
      resources:
        requests:
          storage: 30Gi

    tolerations:
      - key: node-type
        operator: Equal
        value: logging
        effect: NoSchedule
    nodeSelector:
      node-type: logging

    service:
      type: ClusterIP
