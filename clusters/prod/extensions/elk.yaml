apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: elk
  namespace: flux-system
spec:
  interval: 2m
  retryInterval: 1m
  timeout: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./clusters/prod/extensions/system/elk/
  prune: true
  wait: true
  dependsOn:
  - name: infra
  - name: system
  postBuild:
    substituteFrom:
    - kind: ConfigMap
      name: infra-outputs
      optional: false
