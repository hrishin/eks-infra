apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cert-manager-crs
  namespace: flux-system
spec:
  interval: 1m50s
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./clusters/prod/extensions/cert-manager-crs/
  prune: true
  wait: true
  dependsOn:
    - name: infra
