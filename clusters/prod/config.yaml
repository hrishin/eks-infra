node_groups:
  # Core compute nodes for general workloads
  core:
    instance_types: ["t2.medium"]
    await: true
    desired_size: 1
    min_size: 1
    max_size: 2
    disk_size: 20
    max_pods: 110
    ami_id: "ami-060bb37b943ff8d8e"
    ami_type: "CUSTOM"
    labels:
      node-type: "core"
      workload: "system"
      environment: "production"
    taints:
      - key: "node-type"
        value: "core"
        effect: "NoSchedule"

  # Mimir nodes - memory-optimized for metrics storage and Grafana
  mimir:
    instance_types: ["t3.large"]
    await: true
    desired_size: 1
    min_size: 1
    max_size: 3
    disk_size: 50
    max_pods: 110
    ami_id: "ami-060bb37b943ff8d8e"
    ami_type: "CUSTOM"
    labels:
      node-type: "mimir"
      workload: "monitoring"
      environment: "production"
    taints:
      - key: "node-type"
        value: "mimir"
        effect: "NoSchedule"

  logging:
    instance_types: ["t3.large"]
    await: true
    desired_size: 1
    min_size: 1
    max_size: 3
    disk_size: 50
    max_pods: 110
    ami_id: "ami-060bb37b943ff8d8e"
    ami_type: "CUSTOM"
    labels:
      node-type: "logging"
      workload: "monitoring"
      environment: "production"
    taints:
      - key: "node-type"
        value: "logging"
        effect: "NoSchedule"

